name: linux-build

on:
  push:
    paths-ignore:
      - 'docs/**'
  pull_request:
    paths-ignore:
      - 'docs/**'

jobs:
  linux-gui:
    uses: ./.github/workflows/reusable-build.yml
    with:
      runner: ubuntu-latest
      qt-version: ''
      variant: gui
      build-with-python: true

  linux-headless:
    uses: ./.github/workflows/reusable-build.yml
    with:
      runner: ubuntu-latest
      variant: headless
      build-testing: true

  linux-gui-nonpython:
    uses: ./.github/workflows/reusable-build.yml
    with:
      runner: ubuntu-latest
      variant: gui
      build-with-python: false

  linux-gui-ospray:
    if: false
    uses: ./.github/workflows/reusable-build.yml
    with:
      runner: ubuntu-latest
      variant: gui
      with-ospray: true
